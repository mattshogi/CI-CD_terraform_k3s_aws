name: Deploy Ephemeral Environment

# Provision → validate → destroy, with state stored remotely per run so a
# crashed job never orphans untracked resources.
#
# Required repository configuration:
#   Variable TF_STATE_BUCKET  — S3 bucket from scripts/bootstrap_remote_state.sh
#   Variable AWS_ROLE_ARN     — IAM role for GitHub OIDC (preferred), OR
#   Secrets  AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY as fallback
#   Variable AWS_REGION       — optional, defaults to us-east-1

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment label
        type: choice
        options: [staging, production]
        default: staging
      instance_type:
        description: EC2 instance type (t3.small+ recommended with monitoring)
        type: string
        default: t3.small
      enable_monitoring:
        description: Install Prometheus + Grafana
        type: boolean
        default: true
      enable_tls:
        description: cert-manager TLS at <ip>.sslip.io (self-signed issuer)
        type: boolean
        default: true
      keep_after_validate:
        description: Keep resources for debugging (destroy manually later; state stays in S3)
        type: boolean
        default: false
      image_ref:
        description: Image override (repository:tag). Empty = image built by CI for this commit
        type: string
        default: ""

permissions:
  contents: read
  id-token: write # GitHub OIDC federation with AWS

concurrency:
  group: deploy-ephemeral-${{ inputs.environment }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_IN_AUTOMATION: "1"

jobs:
  deploy:
    name: Provision → Validate → ${{ inputs.keep_after_validate && 'Keep' || 'Destroy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # All workflow inputs reach Terraform through TF_VAR_* environment
    # variables — never shell-interpolated — to rule out script injection.
    env:
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_instance_type: ${{ inputs.instance_type }}
      TF_VAR_enable_monitoring: ${{ inputs.enable_monitoring }}
      TF_VAR_enable_tls: ${{ inputs.enable_tls }}
      TF_VAR_repo_ref: ${{ github.sha }}
      TF_VAR_resource_name_suffix: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v5

      - name: Fail fast on missing configuration
        run: |
          missing=0
          if [ -z "${{ vars.TF_STATE_BUCKET }}" ]; then
            echo "::error::Repository variable TF_STATE_BUCKET is not set (run scripts/bootstrap_remote_state.sh, then set the variable)"; missing=1
          fi
          if [ -z "${{ vars.AWS_ROLE_ARN }}" ] && [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "::error::Set repository variable AWS_ROLE_ARN (OIDC, preferred) or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets"; missing=1
          fi
          exit $missing

      - name: Configure AWS credentials (OIDC)
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: deploy-ephemeral-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (static keys fallback)
        if: vars.AWS_ROLE_ARN == ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.x
          terraform_wrapper: false

      - name: Resolve deploy-time variables
        id: resolve
        run: |
          # Operator ports (kube API, NodePorts) open only to this runner's IP
          echo "admin_cidr=$(curl -fsS https://checkip.amazonaws.com)/32" >> "$GITHUB_OUTPUT"
          # Deploy the exact image CI built for this commit unless overridden
          if [ -n "${IMAGE_REF_INPUT}" ]; then
            echo "app_image=${IMAGE_REF_INPUT}" >> "$GITHUB_OUTPUT"
          else
            echo "app_image=ghcr.io/mattshogi/ci-cd_terraform_k3s_aws/hello-world:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi
        env:
          IMAGE_REF_INPUT: ${{ inputs.image_ref }}

      - name: Terraform init (remote state, per-run key)
        id: init
        working-directory: infra
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=ephemeral/${{ github.run_id }}.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform apply
        id: apply
        working-directory: infra
        env:
          TF_VAR_admin_cidr: ${{ steps.resolve.outputs.admin_cidr }}
          TF_VAR_app_image: ${{ steps.resolve.outputs.app_image }}
        run: |
          set -o pipefail
          if terraform apply -auto-approve -input=false 2>&1 | tee ../terraform-apply.log; then
            echo "outcome=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Classify transient AWS failures and retry once
          if grep -qiE 'Throttling|RequestLimitExceeded|NoSuchEntity|InvalidIAMInstanceProfile|ServiceUnavailable|InternalError|DependencyViolation' ../terraform-apply.log; then
            echo "[WARN] Transient failure detected; retrying in 30s" >&2
            sleep 30
            if terraform apply -auto-approve -input=false 2>&1 | tee -a ../terraform-apply.log; then
              echo "outcome=success" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "outcome=failure" >> "$GITHUB_OUTPUT"
          echo "[ERROR] terraform apply failed (destroy still runs; state is in S3)" >&2
          exit 1

      - name: Capture outputs
        id: tf_out
        if: steps.apply.outputs.outcome == 'success'
        working-directory: infra
        run: |
          echo "server_ip=$(terraform output -raw server_public_ip)" >> "$GITHUB_OUTPUT"
          echo "instance_id=$(terraform output -raw server_instance_id)" >> "$GITHUB_OUTPUT"

      - name: Validate endpoints
        id: validate
        if: steps.tf_out.outputs.server_ip != ''
        run: |
          chmod +x scripts/validate_endpoints.sh
          scripts/validate_endpoints.sh "${{ steps.tf_out.outputs.server_ip }}" 45 10

      - name: SSM diagnostics (on validation failure)
        if: failure() && steps.tf_out.outputs.instance_id != ''
        run: |
          iid="${{ steps.tf_out.outputs.instance_id }}"
          cid=$(aws ssm send-command --instance-ids "$iid" \
            --document-name AWS-RunShellScript \
            --parameters 'commands=["k3s kubectl get nodes -o wide || true","k3s kubectl get pods -A -o wide | head -n 40 || true","k3s kubectl get svc,ingress -A || true","tail -n 150 /var/log/cloud-init-output.log || true"]' \
            --query 'Command.CommandId' --output text) || exit 0
          sleep 10
          aws ssm get-command-invocation --command-id "$cid" --instance-id "$iid" \
            --query 'StandardOutputContent' --output text > ssm-diagnostics.txt || true
          echo "SSM diagnostics captured ($(wc -c < ssm-diagnostics.txt) bytes)"

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Ephemeral deploy — ${{ inputs.environment }}"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${{ steps.resolve.outputs.app_image }}\` |"
            echo "| Server IP | \`${{ steps.tf_out.outputs.server_ip || 'n/a' }}\` |"
            echo "| Instance | \`${{ steps.tf_out.outputs.instance_id || 'n/a' }}\` |"
            echo "| State key | \`ephemeral/${{ github.run_id }}.tfstate\` |"
            echo "| Apply | ${{ steps.apply.outputs.outcome || 'skipped' }} |"
            echo "| Validation | ${{ steps.validate.outcome }} |"
            echo "| Destroyed | ${{ !inputs.keep_after_validate }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-ephemeral-${{ github.run_id }}
          path: |
            terraform-apply.log
            ssm-diagnostics.txt
          if-no-files-found: ignore

      - name: Terraform destroy
        # Runs even when apply/validation failed — the per-run remote state
        # key means partial creations are tracked and torn down.
        if: always() && steps.init.outcome == 'success' && !inputs.keep_after_validate
        working-directory: infra
        env:
          TF_VAR_admin_cidr: ${{ steps.resolve.outputs.admin_cidr }}
          TF_VAR_app_image: ${{ steps.resolve.outputs.app_image }}
        run: terraform destroy -auto-approve -input=false
