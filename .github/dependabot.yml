# Automated dependency updates — replaces the hand-rolled
# dependency-updates workflow (less code, native PR grouping).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /app
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /app
    schedule:
      interval: weekly

  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: weekly
